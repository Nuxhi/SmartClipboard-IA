<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>SmartClipboard</h1>
    

    <button id="printBtn"> PRINT </button>

    <script>
    //Généré par IA car je ne savais pas faire.
    // Je dois me penché sur le sujet pour mieux comprendre.
    (function () {
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            const ws = new WebSocket(protocol + "://" + window.location.host + "/ws");

            function closeSocket() {
                if (ws.readyState === WebSocket.CLOSING || ws.readyState === WebSocket.CLOSED) {
                    return;
                }
                ws.close();
            }

            window.addEventListener("pagehide", closeSocket);
            window.addEventListener("beforeunload", closeSocket);
        })();

        const APILINK = "http://127.0.0.1:6767/";


        const prtBtn = document.getElementById("printBtn")
        prtBtn.addEventListener("click", (e) => {
            console.log("click en cours")
            fetch(APILINK+"inverse")
                .then(res => res.json())
                .then(data => console.log(data));
        })


    </script>
</body>
</html>
